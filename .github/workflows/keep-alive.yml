name: Keep Supabase Alive

on:
  schedule:
    # Chạy tự động lúc 00:00 UTC (07:00 sáng VN) mỗi 3 ngày
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công từ giao diện GitHub Action

permissions:
  contents: write

jobs:
  ping_and_keep_active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase REST API (Dynamic Hybrid Mode)
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          # Định nghĩa hàm ping lai (hybrid)
          ping_supabase() {
            local url="$1"
            local key="$2"
            local name="$3"
            
            if [ -z "$url" ] || [ "$url" = "null" ] || [ -z "$key" ] || [ "$key" = "null" ]; then
              echo "Bỏ qua $name do chưa cấu hình URL hoặc Key."
              return 0
            fi
            
            echo "Đang kiểm tra dự án: $name..."
            
            # Cách 1: Truy vấn bảng profiles
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${url}/rest/v1/profiles?limit=1" \
              -H "apikey: ${key}" \
              -H "Authorization: Bearer ${key}")
            
            if [ "$status" = "200" ]; then
              echo "  [OK] Cách 1 (bảng profiles) thành công! HTTP $status"
            else
              echo "  [WARNING] Cách 1 thất bại hoặc không có bảng profiles (HTTP $status)."
              echo "  -> Đang chuyển sang Cách 2 (URL gốc)..."
              
              # Cách 2: Gọi vào URL gốc /rest/v1/ làm phương án dự phòng
              status=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${url}/rest/v1/" \
                -H "apikey: ${key}" \
                -H "Authorization: Bearer ${key}")
              
              echo "  [OK] Cách 2 hoàn thành với HTTP $status"
            fi
          }

          # Tự động quét tất cả các dự án cấu hình trong Secrets
          echo "Đang quét cấu hình các dự án..."
          
          # Đọc danh sách key kết thúc bằng _URL
          url_keys=$(echo "$SECRETS_JSON" | jq -r 'keys[] | select(endswith("_URL"))')
          
          if [ -z "$url_keys" ]; then
            echo "Không tìm thấy dự án nào kết thúc bằng _URL trong Secrets."
            exit 0
          fi
          
          for url_key in $url_keys; do
            prefix="${url_key%_URL}"
            url=$(echo "$SECRETS_JSON" | jq -r --arg k "$url_key" '.[$k]')
            
            # Tìm key tương ứng (chấp nhận cả _ANON_KEY hoặc _PUBLISHABLE_KEY)
            key_name="${prefix}_ANON_KEY"
            key=$(echo "$SECRETS_JSON" | jq -r --arg k "$key_name" '.[$k]')
            
            if [ "$key" = "null" ] || [ -z "$key" ]; then
              key_name="${prefix}_PUBLISHABLE_KEY"
              key=$(echo "$SECRETS_JSON" | jq -r --arg k "$key_name" '.[$k]')
            fi
            
            ping_supabase "$url" "$key" "$prefix"
          done

      - name: Update Heartbeat File (Prevent GitHub from disabling cron after 60 days)
        run: |
          date > heartbeat.txt
          echo "Last run: $(cat heartbeat.txt)"

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          git commit -m "chore: auto-update heartbeat [skip ci]" || exit 0
          git push
