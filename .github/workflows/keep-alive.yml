name: Keep Supabase Alive

on:
  schedule:
    # Chạy tự động lúc 00:00 UTC (07:00 sáng VN) mỗi 3 ngày
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công từ giao diện GitHub Action

permissions:
  contents: write

jobs:
  ping_and_keep_active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase REST API (Ultra-Flexible Hybrid Mode)
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          # 1. Định nghĩa hàm chuẩn hóa tên để ghép đôi (ví dụ: SELLER_URL và SELLER_ANON_KEY đều thành SELLER)
          normalize_name() {
            echo "$1" | tr '[:lower:]' '[:upper:]' \
              | sed -E 's/_(URL|LINK|URI|HOST|ENDPOINT|API|KEY|ANON|TOKEN|SECRET|PUBLISHABLE|PASS|PASSWORD)_?//g' \
              | sed -E 's/(URL|LINK|URI|HOST|ENDPOINT|API|KEY|ANON|TOKEN|SECRET|PUBLISHABLE|PASS|PASSWORD)//g' \
              | tr -d '_-'
          }

          # 2. Định nghĩa hàm ping lai (hybrid)
          ping_supabase() {
            local url="$1"
            local key="$2"
            local name="$3"
            
            if [ -z "$url" ] || [ "$url" = "null" ] || [ -z "$key" ] || [ "$key" = "null" ]; then
              echo "Bỏ qua $name do chưa cấu hình URL hoặc Key."
              return 0
            fi
            
            echo "Đang kiểm tra dự án: $name..."
            
            # Cách 1: Truy vấn bảng profiles
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${url}/rest/v1/profiles?limit=1" \
              -H "apikey: ${key}" \
              -H "Authorization: Bearer ${key}")
            
            if [ "$status" = "200" ]; then
              echo "  [OK] Cách 1 (bảng profiles) thành công! HTTP $status"
            else
              echo "  [WARNING] Cách 1 thất bại hoặc không có bảng profiles (HTTP $status)."
              echo "  -> Đang chuyển sang Cách 2 (URL gốc)..."
              
              # Cách 2: Gọi vào URL gốc /rest/v1/ làm phương án dự phòng
              status=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${url}/rest/v1/" \
                -H "apikey: ${key}" \
                -H "Authorization: Bearer ${key}")
              
              echo "  [OK] Cách 2 hoàn thành với HTTP $status"
            fi
          }

          # 3. Phân loại và tự động ghép đôi các Secret bất kỳ
          echo "Đang quét và tự động ghép đôi các Secret..."
          
          # Đọc các URL (các secret có giá trị bắt đầu bằng http)
          url_keys=$(echo "$SECRETS_JSON" | jq -r 'to_entries[] | select(.value | startswith("http")) | .key')
          
          if [ -z "$url_keys" ]; then
            echo "Không tìm thấy bất kỳ cấu hình URL nào (giá trị bắt đầu bằng http) trong Secrets."
            exit 0
          fi
          
          # Đọc các Key (các secret có giá trị không bắt đầu bằng http và không rỗng)
          key_keys=$(echo "$SECRETS_JSON" | jq -r 'to_entries[] | select(.value | startswith("http") | not) | select(.value != "") | .key')
          
          for url_key in $url_keys; do
            url_val=$(echo "$SECRETS_JSON" | jq -r --arg k "$url_key" '.[$k]')
            norm_url=$(normalize_name "$url_key")
            
            matched_key_name=""
            matched_key_val=""
            
            # Tìm Key có tên chuẩn hóa trùng khớp với URL
            for key_key in $key_keys; do
              norm_key=$(normalize_name "$key_key")
              if [ "$norm_url" = "$norm_key" ]; then
                matched_key_name="$key_key"
                matched_key_val=$(echo "$SECRETS_JSON" | jq -r --arg k "$key_key" '.[$k]')
                break
              fi
            done
            
            if [ -n "$matched_key_val" ] && [ "$matched_key_val" != "null" ]; then
              echo "Ghép đôi thành công: URL '$url_key' <-> Key '$matched_key_name' (Nhóm: $norm_url)"
              ping_supabase "$url_val" "$matched_key_val" "$norm_url"
            else
              echo "[ERROR] Không tìm thấy Key phù hợp cho URL '$url_key'."
              echo "        Mẹo đặt tên: Hãy đặt tên Key có phần chữ giống URL (Ví dụ: 'MYAPP_URL' và 'MYAPP_KEY' -> cùng có chữ 'MYAPP')."
            fi
          done

      - name: Update Heartbeat File (Prevent GitHub from disabling cron after 60 days)
        run: |
          date > heartbeat.txt
          echo "Last run: $(cat heartbeat.txt)"

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          git commit -m "chore: auto-update heartbeat [skip ci]" || exit 0
          git push
