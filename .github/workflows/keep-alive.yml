name: Keep Supabase Alive

on:
  schedule:
    # Chạy tự động lúc 00:00 UTC (07:00 sáng VN) mỗi 3 ngày
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công từ giao diện GitHub Action

permissions:
  contents: write

jobs:
  ping_and_keep_active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase Projects..."
          
          # Dự án 1 (Seller App)
          # Thêm secrets.PROJECT_1_URL và secrets.PROJECT_1_ANON_KEY vào Settings -> Secrets -> Actions của repo
          curl -s -o /dev/null -w "Project 1 Status: %{http_code}\n" -X GET "${{ secrets.PROJECT_1_URL }}/rest/v1/profiles?limit=1" \
            -H "apikey: ${{ secrets.PROJECT_1_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.PROJECT_1_ANON_KEY }}"
          
          # Nếu bạn có thêm dự án khác, hãy sao chép dòng curl trên và thay bằng PROJECT_2_URL, PROJECT_2_ANON_KEY

      - name: Update Heartbeat File (Prevent GitHub from disabling cron after 60 days)
        run: |
          date > heartbeat.txt
          echo "Last run: $(cat heartbeat.txt)"

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add heartbeat.txt
          git commit -m "chore: auto-update heartbeat [skip ci]" || exit 0
          git push
